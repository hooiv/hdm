<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }

    .status-text {
      font-size: 13px;
      color: #94a3b8;
    }

    .section {
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .token-input-row {
      display: flex;
      gap: 6px;
    }

    .token-input {
      flex: 1;
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 11px;
      font-family: 'Fira Code', 'Consolas', monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    .token-input:focus {
      border-color: rgba(59, 130, 246, 0.5);
    }

    .token-input::placeholder {
      color: #475569;
    }

    .btn-save {
      padding: 8px 12px;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .btn-save:hover {
      opacity: 0.9;
    }

    .btn-save:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .token-hint {
      font-size: 10px;
      color: #475569;
      margin-top: 6px;
      line-height: 1.4;
    }

    .token-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      font-size: 11px;
    }

    .token-status.valid {
      color: #22c55e;
    }

    .token-status.missing {
      color: #f59e0b;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .toggle-label {
      font-size: 13px;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #475569;
      transition: 0.3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>HyperStream</h1>
  </div>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking connection...</span>
  </div>

  <div class="section">
    <div class="section-label">Auth Token</div>
    <div class="token-input-row">
      <input type="password" class="token-input" id="tokenInput" placeholder="Paste token from HyperStream settings" spellcheck="false" autocomplete="off">
      <button class="btn-save" id="saveToken">Save</button>
    </div>
    <div class="token-status" id="tokenStatus"></div>
    <div class="token-hint">Copy the token from HyperStream's Settings &gt; Advanced tab.</div>
  </div>

  <div class="toggle-container">
    <span class="toggle-label">Intercept Downloads</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="footer">
    Downloads will be handled by HyperStream
  </div>

  <script src="popup.js"></script>
</body>
</html>
