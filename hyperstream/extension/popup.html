<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="title">
        <img src="icons/icon48.png" width="20" height="20" />
        HyperStream
      </div>
      <div id="status" class="status-badge offline">...</div>
    <div class="section" style="margin-top:8px;">
      <div class="section-label">Server URL</div>
      <input type="text" id="apiUrlInput" class="search-input" placeholder="http://localhost:14733">
      <div class="token-hint">Override the local HyperStream API endpoint (optional).</div>
    </div>
    </header>

    <div class="status-section">
      <div style="font-size:11px;font-weight:600;color:#e2e8f0;">Auth Token</div>
      <input type="password" id="tokenInput" class="search-input" placeholder="Paste token from HyperStream settings" spellcheck="false" autocomplete="off">
      <button id="saveToken" class="btn-secondary" style="width:100%;">Save Token</button>
      <div id="tokenStatus" style="font-size:11px;color:#94a3b8;">Paste the Browser Extension Token from HyperStream settings.</div>
    </div>

    <div class="controls">
      <input type="text" id="search-input" class="search-input" placeholder="Search files...">

      <div class="filter-tabs">
        <button class="tab-btn active" data-filter="all">All</button>
        <button class="tab-btn" data-filter="media">Media</button>
        <button class="tab-btn" data-filter="doc">Docs</button>
        <button class="tab-btn" data-filter="other">Other</button>
      </div>
    </div>

    <div id="results-list" class="list"></div>

    <div id="empty-state" style="text-align: center; color: #64748b; font-size: 12px; padding: 20px;">
      Scanning page...
    </div>

    <div class="action-bar">
      <button id="download-selected-btn" class="btn-primary" disabled>Download (0)</button>
      <button id="rescan-btn" class="btn-secondary">↺</button>
    </div>

    <!-- Active downloads status section -->
    <div class="status-section">
      <button id="refresh-status-btn" class="btn-secondary" style="width:100%;margin-bottom:8px;">Refresh active downloads</button>
      <div id="status-list" class="list"></div>
    </div>

    <div class="switch-container">
      <span class="switch-label">Intercept Downloads</span>
      <label class="switch">
        <input type="checkbox" id="intercept-toggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
